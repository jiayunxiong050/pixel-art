<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>拼豆编辑器 清新风格对比</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; background: #0d0d0d; color: #fff; }
    .tab-btn { transition: all 0.15s; cursor: pointer; }
    .tab-btn.active { background: #222; border-bottom: 2px solid; }
    .preview-frame { height: calc(100vh - 56px - 52px); overflow: hidden; }
    .preview-inner { height: 100%; }
    .color-dot { width: 28px; height: 28px; border-radius: 6px; display: inline-block; }
  </style>
</head>
<body>

  <!-- 顶部切换栏 -->
  <div class="h-14 bg-[#0a0a0a] border-b border-white/10 flex items-center px-5 gap-3 shrink-0">
    <span class="text-xs text-gray-500 mr-2 font-medium">小清新风格预览</span>

    <button onclick="switchStyle(0)" id="tab-0" class="tab-btn active px-4 py-1.5 rounded text-xs text-gray-300">白陶暖调</button>
    <button onclick="switchStyle(1)" id="tab-1" class="tab-btn px-4 py-1.5 rounded text-xs text-gray-300">抹茶森林</button>
    <button onclick="switchStyle(2)" id="tab-2" class="tab-btn px-4 py-1.5 rounded text-xs text-gray-300">薄荷奶绿</button>
    <button onclick="switchStyle(3)" id="tab-3" class="tab-btn px-4 py-1.5 rounded text-xs text-gray-300">奶油杏</button>
    <button onclick="switchStyle(4)" id="tab-4" class="tab-btn px-4 py-1.5 rounded text-xs text-gray-300">雾霾蓝灰</button>
    <button onclick="switchStyle(5)" id="tab-5" class="tab-btn px-4 py-1.5 rounded text-xs text-gray-300">极简粉白</button>

    <div class="ml-auto text-[10px] text-gray-600">点击切换预览</div>
  </div>

  <!-- 预览区 -->
  <div class="preview-frame">
    <div id="preview-content"></div>
  </div>

  <!-- 底部说明 -->
  <div class="h-13 bg-[#0a0a0a] border-t border-white/10 flex items-center px-6 gap-6 text-[11px] text-gray-500 shrink-0">
    <div id="style-name" class="text-gray-300 font-medium text-xs"></div>
    <div id="style-desc" class="text-gray-500 text-xs"></div>
    <div id="style-hex" class="ml-auto flex gap-3 text-[10px] text-gray-600 font-mono"></div>
  </div>

        <div style="display:flex;justify-content:space-between;align-items:center">
          <span style="font-size:12px;color:#B05068">品牌</span>
          <span style="font-size:11px;color:#D4708A;font-weight:600">MARD</span>
        </div>
        <div style="display:flex;justify-content:space-between;align-items:center">
          <span style="font-size:12px;color:#B05068">编号</span>
          <div style="width:36px;height:20px;background:#D4708A;border-radius:10px;position:relative">
            <div style="position:absolute;left:2px;top:2px;width:14px;height:14px;background:white;border-radius:50%"></div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>`
      }
    ];

    function switchStyle(index) {
      document.querySelectorAll('.tab-btn').forEach((btn, i) => {
        btn.classList.toggle('active', i === index);
        btn.style.borderBottomColor = i === index ? styles[i].tabColor : 'transparent';
      });

      const style = styles[index];
      document.getElementById('preview-content').innerHTML = `<div class="preview-inner">${style.html}</div>`;
      document.getElementById('style-name').textContent = style.name;
      document.getElementById('style-desc').textContent = style.desc;
      document.getElementById('style-hex').innerHTML = style.hex.map(h =>
        `<span style="display:inline-flex;align-items:center;gap:4px">
          <span style="width:12px;height:12px;border-radius:2px;background:${h};border:1px solid rgba(0,0,0,0.1)"></span>
          ${h}
        </span>`
      ).join('');
    }

    // Init
    switchStyle(0);
  </script>
</body>
</html>
